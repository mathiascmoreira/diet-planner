<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planejador de Dieta</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Overlay de Carregamento (Spinner) -->
  <div id="loading-spinner" class="spinner-overlay" style="display: none;">
    <div class="spinner"></div>
  </div>

  <div class="app-container">
    <header>
      <h1>Planejador de Dieta Diário</h1>
    </header>
    
    <!-- Criador de Seções -->
    <div class="add-section-container">
      <input type="text" id="new-section-name" placeholder="Nome da Refeição (ex: Almoço)">
      <button class="btn-primary" onclick="addSection()">+ Criar Refeição</button>
    </div>
    
    <!-- As seções de refeição serão injetadas aqui -->
    <main id="meals-container"></main>
    
    <!-- Totais Gerais -->
    <section class="grand-total-section" id="grand-total-section"></section>

    <!-- Botão para abrir o painel de alimentos -->
    <div class="db-toggle-container">
      <button class="btn-secondary" onclick="toggleFoodDB()">⚙️ Gerenciar Banco de Alimentos</button>
    </div>

    <!-- Gerenciador do Banco de Alimentos (Oculto por padrão) -->
    <section class="food-db-section" id="food-db-section" style="display: none;">
      <div class="meal-header">
        <h2>Banco de Alimentos Personalizado</h2>
        <div class="meal-actions">
          <button class="btn-primary" onclick="openFoodModal()">+ Novo Alimento</button>
          <button class="btn-secondary" onclick="toggleFoodDB()">Ocultar</button>
        </div>
      </div>
      <div id="food-db-container">
        <!-- Tabela de alimentos injetada via JS -->
      </div>
    </section>
  </div>

  <!-- Modal de Adicionar/Editar Item na Refeição -->
  <div id="add-item-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">&times;</span>
      <h2 id="modal-title">Adicionar Item</h2>
      
      <div class="form-group">
        <label for="food-select">Selecionar Alimento:</label>
        <select id="food-select"></select>
      </div>
      
      <div class="form-group">
        <label for="food-qty">Quantidade (<span id="unit-label">g</span>):</label>
        <input type="number" id="food-qty" min="1" step="1" value="100">
      </div>
      
      <input type="hidden" id="edit-index" value="-1">
      <button onclick="saveItem()" class="btn-primary" style="width: 100%;">Salvar Alimento na Refeição</button>
    </div>
  </div>

  <!-- Modal de Adicionar/Editar Alimento no Banco de Dados -->
  <div id="food-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeFoodModal()">&times;</span>
      <h2 id="food-modal-title">Novo Alimento</h2>
      
      <div class="form-group">
        <label>Nome do Alimento:</label>
        <input type="text" id="db-food-name" placeholder="Ex: Batata Doce">
      </div>
      <div class="form-group row-group">
        <div class="col-group">
          <label>Qtd. Referência:</label>
          <input type="number" id="db-food-ref" value="100" min="1">
        </div>
        <div class="col-group">
          <label>Unidade:</label>
          <select id="db-food-unit">
            <option value="g">Gramas (g)</option>
            <option value="ml">Mililitros (ml)</option>
            <option value="un">Unidade (un)</option>
          </select>
        </div>
      </div>
      <div class="form-group row-group">
        <div class="col-group">
          <label>Proteína (g):</label>
          <input type="number" id="db-food-prot" step="0.1" value="0">
        </div>
        <div class="col-group">
          <label>Carbos (g):</label>
          <input type="number" id="db-food-carb" step="0.1" value="0">
        </div>
      </div>
      <div class="form-group row-group">
        <div class="col-group">
          <label>Gorduras (g):</label>
          <input type="number" id="db-food-fat" step="0.1" value="0">
        </div>
        <div class="col-group">
          <label>Kcal:</label>
          <input type="number" id="db-food-cal" step="1" value="0">
        </div>
      </div>
      
      <input type="hidden" id="db-edit-index" value="-1">
      <button onclick="saveFoodDB()" class="btn-primary" style="width: 100%;">Salvar no Banco</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
